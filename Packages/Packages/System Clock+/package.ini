[Sys-Clk-OC│Manager]
[안내문]
;mode=table
;spacing=5
;gap=30
'안내:'='클럭 조정 앱의 사용 유/무를 결정합니다'
''='비활성화시 오버레이를 한 번 종료합니다'

[활성화]
;mode=toggle?on
on:
    del /atmosphere/contents/420000000000000B/
    del /atmosphere/kips/loader.kip
    del /atmosphere/logs/sys-patch.log
    set-ini-val './config.ini' 'EOS Toolkit' footer Off
    set-ini-val './config.ini' 'SC Toolkit' footer Off
    mv '/config/ASAP-assist/OC/' '/atmosphere/contents/00FF0000636C6BFF/'
    mv '/config/ASAP-assist/Packages/SC Toolkit/' '/config/ASAP-assist/Packages/.offload/SC Toolkit/'
    mv '/config/ASAP-assist/Packages/EOS Toolkit/' '/config/ASAP-assist/Packages/.offload/EOS Toolkit/'
    mv '/config/ASAP-assist/Packages/.offload/System Clock+/' '/config/ASAP-assist/Packages/System Clock+/'
    mv '/switch/.overlays/.offload/sys-clk-overlay.ovl' '/switch/.overlays/'
    mv '/config/ASAP-assist/Homebrews/sys-clk-manager/' '/switch/sys-clk-manager/'
    refresh
off:
    del /atmosphere/contents/420000000000000B/
    del /atmosphere/kips/loader.kip
    del /atmosphere/logs/sys-patch.log
    set-ini-val './config.ini' 'EOS Toolkit' footer Off
    set-ini-val './config.ini' 'SC Toolkit' footer Off
    mv '/atmosphere/contents/00FF0000636C6BFF/' '/config/ASAP-assist/OC/'
    mv '/config/ASAP-assist/Packages/SC Toolkit/' '/config/ASAP-assist/Packages/.offload/SC Toolkit/'
    mv '/config/ASAP-assist/Packages/EOS Toolkit/' '/config/ASAP-assist/Packages/.offload/EOS Toolkit/'
    mv '/config/ASAP-assist/Packages/.offload/System Clock+/' '/config/ASAP-assist/Packages/System Clock+/'
    set-ini-val '/config/ASAP-assist/Packages/System Clock+/config.ini' '활성화' footer Off
    mv '/switch/.overlays/sys-clk-overlay.ovl' '/switch/.overlays/.offload/'
    mv '/switch/sys-clk-manager/' '/config/ASAP-assist/Homebrews/sys-clk-manager/'
    exit


