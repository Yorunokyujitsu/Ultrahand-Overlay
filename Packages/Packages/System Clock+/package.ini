[EOS Toolkit]
;mode=toggle
on:
    del /atmosphere/kips/loader.kip
    cp '/backup/kips/.EOS/loader.kip' '/atmosphere/kips/'
    cp '/atmosphere/contents/010B6ECF3B30D000/02/boot2.flag' '/atmosphere/contents/420000000000000B/flags/'
    cp '/atmosphere/contents/010B6ECF3B30D000/02/exefs.nsp' '/atmosphere/contents/420000000000000B/'
    mv '/config/ASAP-assist/Packages/SC Toolkit/' '/config/ASAP-assist/Packages/.offload/SC Toolkit/'
    mv '/config/ASAP-assist/Packages/.offload/EOS Toolkit/' '/config/ASAP-assist/Packages/EOS Toolkit/'
    set-ini-val './config.ini' 'EOS Toolkit' footer On
    set-ini-val './config.ini' 'SC Toolkit' footer Off
    mv '/config/ASAP-assist/Packages/System Clock+/' '/config/ASAP-assist/Packages/.offload/System Clock+/'
    reboot boot '커펌 (eMMC/SD Card)'
off:
    del /atmosphere/contents/420000000000000B/
    del /atmosphere/kips/loader.kip
    del /atmosphere/logs/sys-patch.log
    mv '/config/ASAP-assist/Packages/SC Toolkit/' '/config/ASAP-assist/Packages/.offload/SC Toolkit/'
    mv '/config/ASAP-assist/Packages/EOS Toolkit/' '/config/ASAP-assist/Packages/.offload/EOS Toolkit/'
    set-ini-val './config.ini' 'EOS Toolkit' footer Off
    set-ini-val './config.ini' 'SC Toolkit' footer Off
    mv '/config/ASAP-assist/Packages/.offload/System Clock+/' '/config/ASAP-assist/Packages/System Clock+/'
    reboot boot '커펌 (eMMC/SD Card)'

